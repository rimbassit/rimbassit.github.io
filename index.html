<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>I See Counseling | Mental Health & Personal Development</title>
    <meta name="description" content="Professional counseling and personal development services. Helping you gain clarity and insight.">

    <style>
      /* Page Setup */
      body {
        background-color: #ffffff;
        color: #1a1a3a; /* Navy from your logo */
        font-family: 'Helvetica Neue', Arial, sans-serif;
        line-height: 1.6;
        margin: 0;
        padding: 0;
      }

      /* Container for all content */
      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 40px 20px;
        text-align: center;
      }

      /* LOGO SIZE CONTROL - This keeps it from being huge */
      .logo-img {
        width: 100%;
        max-width: 300px; /* Change this number if you want it even smaller (e.g., 250px) */
        height: auto;
        margin: 0 auto 30px auto;
        display: block;
      }

      /* Headings & Text */
      h1 {
        color: #f36f21; /* Orange from your logo */
        font-size: 2.2em;
        margin-top: 10px;
      }

      h2 {
        color: #8a2a7a; /* Purple from your logo */
        border-bottom: 2px solid #ffba00; /* Yellow accent */
        display: inline-block;
        padding-bottom: 5px;
        margin-top: 30px;
      }

      p {
        font-size: 1.1em;
        color: #333;
        margin-bottom: 25px;
      }

      /* Button Styling */
      .appointment-button {
        background-color: #f36f21;
        color: white !important;
        padding: 12px 28px;
        text-decoration: none;
        border-radius: 25px;
        font-weight: bold;
        display: inline-block;
        transition: 0.3s;
      }

      .appointment-button:hover {
        background-color: #d15d19;
      }
    </style>
</head>
<body>

  <div class="container">
    
    <img src="logo.png" alt="I See Counseling Logo" class="logo-img">
    
    <h1>I See Counseling</h1>
    
    <p>Gaining clarity and insight on your mental health and personal development journey.</p>
    
    <a href="mailto:your.email@address.com" class="appointment-button">Request an Appointment</a>

    <br><br>

    <h2>Our Services</h2>
    <p>Individual Counseling • Personal Development • Holistic Wellness</p>

  </div>

</body>
</html>
