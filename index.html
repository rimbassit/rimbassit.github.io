<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I See Counseling | See, Understand, Unlock</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
      /* BASE STYLES (Mobile First) */
      body, html {
        min-height: 100%; /* Changed from height: 100% to allow scrolling on small phones */
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #ffffff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #1a1a3a;
        text-align: center;
      }

      .home-container {
        width: 100%;
        max-width: 800px;
        padding: 40px 20px; /* More vertical breathing room for mobile */
        box-sizing: border-box;
      }

      /* Responsive Logo */
      .logo-img {
        width: 100%;
        max-width: 280px; /* Slightly smaller on mobile */
        height: auto;
        margin-bottom: 5px;
        transition: all 0.3s ease;
      }

      /* HEADLINE: Fluid size using 'vw' (viewport width) with a min/max fallback */
      h1 {
        font-family: 'Great Vibes', cursive;
        font-size: clamp(2.8rem, 10vw, 3.8rem); 
        font-weight: 400;
        color: #f36f21; 
        margin: 0;
        line-height: 1.1;
      }

      .tagline {
        font-size: 1rem;
        color: #1a1a3a;
        margin: 15px auto 40px auto;
        max-width: 500px; /* Keeps text from getting too wide on desktop */
        letter-spacing: 0.5px;
        line-height: 1.4;
      }

      /* Button Navigation */
      .nav-menu {
        display: flex;
        flex-direction: column;
        gap: 15px;
        align-items: center;
        margin-bottom: 50px;
      }

      .btn {
        text-decoration: none;
        color: white;
        font-weight: 500;
        font-size: 1.1rem; /* Slightly larger for easier mobile tapping */
        padding: 14px 0;
        width: 100%; /* Full width on mobile containers */
        max-width: 280px; /* Fixed max width for desktop */
        border-radius: 8px;
        border: 1px solid rgba(0,0,0,0.1);
        transition: transform 0.2s, opacity 0.2s;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      }

      .btn-about { background-color: #8e2b88; }
      .btn-services { background-color: #ef2324; }
      .btn-contact { background-color: #f7941d; }

      .btn:hover {
        opacity: 0.9;
        transform: translateY(-2px); /* Lift effect instead of just scaling */
      }

      .footer-logistics {
        font-size: 0.9rem;
        color: #1a1a3a;
        line-height: 1.8;
        opacity: 0.9;
      }

      /* DESKTOP SPECIFIC ADJUSTMENTS */
      @media (min-width: 768px) {
        .logo-img {
          max-width: 320px;
          margin-left: -20px; /* Only nudge on desktop where space allows */
        }
        
        .tagline {
          font-size: 1.15rem;
        }

        .btn {
          font-size: 1rem;
          padding: 12px 0;
        }
      }
