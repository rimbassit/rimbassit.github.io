<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I See Counseling | Discover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
        <ul class="nav-list" id="nav-list">
            <li><a href="who.html">Who We Are</a></li>
            <li><a href="experience.html">Our Experience</a></li>
            <li><a href="vision.html">Our Vision</a></li>
            <li><a href="offer.html">What We Offer</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>

    <div class="main-layout">
        <div class="logo-container">
            <img src="images/main-logo.png" alt="I See Counseling Logo" class="main-logo">
        </div>

        <hr class="divider">

        <div class="discover-banner-container">
            <div class="discover-banner">
                <h2>Discover</h2>
            </div>
        </div>

        <section class="icon-grid">
            <div class="icon-item">
                <p>Who<br>We Are</p>
                <a href="who.html"><img src="images/who-we-are.png" alt="Who We Are"></a>
            </div>
            <div class="icon-item">
                <p>Our<br>Experience</p>
                <a href="experience.html"><img src="images/achieved.png" alt="Our Experience"></a>
            </div>
            <div class="icon-item">
                <p>Our<br>Vision</p>
                <a href="vision.html"><img src="images/vision.png" alt="Our Vision"></a>
            </div>
            <div class="icon-item">
                <p>What<br>We Offer</p>
                <a href="offer.html"><img src="images/offer.png" alt="What We Offer"></a>
            </div>
            <div class="icon-item">
                <p>Contact<br>Us</p>
                <a href="contact.html"><img src="images/contact.png" alt="Contact Us"></a>
            </div>
        </section>
    </div>

    <script>
        const menu = document.querySelector('#mobile-menu');
        const navList = document.querySelector('#nav-list');
        
        menu.addEventListener('click', () => {
            navList.classList.toggle('active');
        });

        document.querySelectorAll('.nav-list li a').forEach(n => n.addEventListener('click', () => {
            navList.classList.remove('active');
        }));
    </script>
</body>
</html>
